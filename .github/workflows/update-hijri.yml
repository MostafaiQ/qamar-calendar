name: Update Hijri Month Starts

on:
  schedule:
    # Run on July 1 each year — Sistani publishes الاهلة before each Hijri year
    # Hijri years start around June/July in Gregorian calendar
    - cron: '0 12 1 7 *'
    # Also run on Jan 1 as a safety check
    - cron: '0 12 1 1 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Step 1: Download Sistani الاهلة images
      - name: Download calendar images
        run: node scripts/scrape-sistani-ahelleh.js

      # Step 2: Use Claude Code to read images and update monthStarts.js
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Extract dates with Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Read the calendar images in .ahelleh-images/ folder. Each PNG is a page from Sistani's مواقيت الأهلة. Some pages contain calendar tables showing Hijri months with weekday grids and Gregorian dates. For each of the 12 Hijri months, find the Gregorian date for day 1. Then update src/data/monthStarts.js confirmedStarts object with the new year's data, following the exact format of existing entries. Read metadata.json in the same folder for the Hijri year number. Do NOT remove existing years - only add/update. Commit is not needed." --allowedTools "Read,Edit,Write,Glob,Bash"

      # Step 3: Clean up images
      - name: Clean up
        run: rm -rf .ahelleh-images

      # Step 4: Commit and push if changed
      - name: Commit and deploy if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/monthStarts.js
          git diff --staged --quiet || (git commit -m "auto: update Shia Hijri month starts from Sistani الاهلة" && git push)
