name: Update Hijri Month Starts

on:
  schedule:
    # Run daily at 6 PM UTC (9 PM Kuwait/Iraq time)
    # Moon sighting announcements typically come in the evening
    - cron: '0 18 * * *'
    # Also run around Maghrib time in case of late announcements
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: node scripts/update-month-start.js
      - name: Commit and deploy if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/monthStarts.js
          git diff --staged --quiet || (git commit -m "auto: update confirmed hijri month starts" && git push)
